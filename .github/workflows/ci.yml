name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Vars mínimas para o build não explodir na validação de env (src/env.ts)
      DATABASE_URL:                 "postgresql://user:pass@localhost:5432/album_ci"
      DIRECT_URL:                   "postgresql://user:pass@localhost:5432/album_ci"
      SESSION_SECRET:               "ci-secret-placeholder-32-characters-long"
      BASE_DOMAIN:                  "localhost"
      NODE_ENV:                     "production"
      STORAGE_S3_ENDPOINT:          "https://example.com/storage/v1/s3"
      STORAGE_S3_REGION:            "us-east-1"
      STORAGE_S3_ACCESS_KEY_ID:     "ci-placeholder"
      STORAGE_S3_SECRET_ACCESS_KEY: "ci-placeholder"
      STORAGE_BUCKET:               "figurinhas"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar cliente Prisma
        run: npx prisma generate

      - name: Verificar tipos TypeScript
        run: npx tsc --noEmit

      - name: Build de produção
        run: npm run build
